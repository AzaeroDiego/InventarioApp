{% extends "base.html" %}

{% block title %}Nuevo Vendedor - Gestión de Inventario{% endblock %}
{% block page_title %}➕ Nuevo Vendedor{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-8">
            <div class="card">
                <div class="card-header">
                    <h3>Datos del Vendedor</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="nombre"><strong>Nombre Completo *</strong></label>
                            <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan Pérez">
                        </div>

                        <div class="form-group">
                            <label for="email"><strong>Email</strong></label>
                            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com">
                        </div>

                        <div class="form-group">
                            <label for="telefono"><strong>Teléfono</strong></label>
                            <input type="tel" id="telefono" name="telefono" placeholder="Ej: +51 999 999 999">
                        </div>

                        <div class="form-group">
                            <label for="comision"><strong>Comisión (%)</strong></label>
                            <input type="number" id="comision" name="comision" step="0.1" min="0" max="100" value="0" placeholder="Porcentaje de comisión">
                            <small style="color: #7f8c8d; display: block; margin-top: 5px;">
                                Porcentaje de comisión sobre ventas (opcional)
                            </small>
                        </div>

                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-check"></i> Crear Vendedor
                            </button>
                            <a href="{{ url_for('main.vendedores') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
