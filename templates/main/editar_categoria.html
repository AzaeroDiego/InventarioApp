{% extends "base.html" %}

{% block title %}Editar Categoría - Gestión de Inventario{% endblock %}
{% block page_title %}Editar Categoría{% endblock %}

{% block content %}
<div class="row">
    <div class="col-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="form-group">
                        <label for="nombre">
                            <i class="fas fa-tag"></i> Nombre de la Categoría
                        </label>
                        <input type="text" id="nombre" name="nombre" value="{{ categoria.nombre }}" required>
                    </div>

                    <div class="form-group">
                        <label for="color">
                            <i class="fas fa-palette"></i> Color
                        </label>
                        <input type="color" id="color" name="color" value="{{ categoria.color }}" required>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                        <a href="{{ url_for('main.categorias') }}" class="btn btn-light">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-6">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Vista Previa</h3>
            </div>
            <div class="card-body text-center">
                <div style="width: 100px; height: 100px; background-color: {{ categoria.color }}; border-radius: 8px; margin: 0 auto 15px;"></div>
                <h4 style="font-size: 16px; font-weight: 600; margin: 0;">{{ categoria.nombre }}</h4>
                <p style="color: #7f8c8d; font-size: 13px; margin: 5px 0 0 0;">
                    {{ categoria.color }}
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
